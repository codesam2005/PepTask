apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: <account-id>.dkr.ecr.ap-south-1.amazonaws.com/taskpep-backend
          ports:
            - containerPort: 5000