apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: <account-id>.dkr.ecr.ap-south-1.amazonaws.com/taskpep-frontend
          ports:
            - containerPort: 80